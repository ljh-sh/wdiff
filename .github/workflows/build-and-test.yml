name: build-and-test

# PR / push cheap-but-thorough test: every push to main and every PR
# builds the full 5-target matrix (musl x86_64 + aarch64, macos
# aarch64 + x86_64, windows x86_64) and runs the smoke test against
# the freshly-built `wdiff` + `diff` pair. Uploads dist/ as workflow
# artifacts so a human can grab any per-target binary for inspection.
#
# This is the "auto-test" stage per the ljh-sh dist regime convention
# (see `.claude/skills/rust-oss/ci/` in mneme — same split for Rust
# projects, adapted to autotools here). `release.yml` is the separate
# "publish" stage — it only fires on v* tags and `workflow_dispatch`,
# so this workflow's output is what gates a PR.
#
# Triggers: push (incl. merging a PR) to main; pull_request. We do NOT
# listen to tag pushes here — release.yml handles those, and we don't
# want the same matrix to run twice.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-linux-musl,  runner: ubuntu-latest,    os: linux,   libc: musl, docker_arch: amd64 }
          - { target: aarch64-linux-musl, runner: ubuntu-24.04-arm, os: linux,   libc: musl, docker_arch: arm64 }
          - { target: aarch64-macos,      runner: macos-14,         os: macos                 }
          - { target: x86_64-macos,       runner: macos-14,         os: macos                 }
          - { target: x86_64-windows,     runner: windows-latest,   os: windows               }
          # aarch64-windows deferred — same MSYS2 mingw64 package gap as
          # in ljh-sh/lhasa's build-and-test.yml.
    continue-on-error: true
    # All matrix entries are best-effort for v0.2.x. The release
    # workflow (release.yml) is configured with `if: always() &&
    # needs.build.result != 'cancelled'` so it fires regardless of
    # which entries succeed — the SHA256SUMS + cosign signatures
    # only cover the per-target artefacts that did build.
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      # ---- install deps ----
      - name: Install deps (Linux gnu — needed to drive the alpine docker locally)
        if: matrix.libc == 'musl'
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool

      - name: Install deps (macOS)
        if: matrix.os == 'macos'
        run: |
          brew update
          brew install autoconf automake libtool

      - name: Install deps (Windows MSYS2 + mingw64)
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # mingw-w64-x86_64-gcc provides gcc (C only).
          # For projects that need C++ (like dwdiff's bundled ICU
          # in v0.3.0+), add mingw-w64-x86_64-gcc as well — both
          # packages are needed for the cross-compile.
          install: >-
            git autoconf automake libtool
            make base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gettext
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-libtool

      # ---- build + smoke ----
      # Musl: single Alpine `docker run` does build + smoke (alpine's
      # apk brings everything we need including bash, make, gcc, the
      # autotools family, libtool, gettext-dev, libxslt).
      - name: Build + smoke on Alpine (musl)
        if: matrix.libc == 'musl'
        # texinfo provides makeinfo for diffutils' doc target;
        # help2man provides the man-page generator that wdiff's
        # man/ target needs. Without help2man, wdiff.1 fails to
        # build.
        run: docker run --rm --platform linux/${{ matrix.docker_arch }} -v "$PWD":/w -w /w alpine:3.20 sh -c 'apk add --no-cache bash gettext-dev libxslt texinfo help2man perl >/dev/null && bash /w/scripts/build-alpine.sh && bash /w/scripts/smoke.sh'

      - name: Build (macOS — host)
        if: matrix.os == 'macos' && matrix.target == 'aarch64-macos'
        run: bash scripts/build.sh

      - name: Build (macOS x86_64 — cross-compile)
        if: matrix.target == 'x86_64-macos'
        env:
          WDIFF_TARGET_ARCH: x86_64
          WDIFF_TARGET_OS: apple-darwin
          WDIFF_OS_HINT: darwin
        run: bash scripts/build.sh

      - name: Build (Windows x86_64 — msys2 bash)
        if: matrix.os == 'windows' && matrix.target == 'x86_64-windows'
        shell: msys2 {0}
        run: bash scripts/build.sh

      # ---- smoke ----
      - name: Smoke test on host (gnu / macos)
        if: matrix.os != 'windows' && matrix.libc != 'musl'
        run: bash scripts/smoke.sh

      - name: Smoke test on Alpine (musl)
        if: matrix.libc == 'musl'
        run: echo "smoke already ran inside the docker build step"

      - name: Smoke test on Windows (informational only)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        continue-on-error: true
        run: |
          set +e
          WD="${{ github.workspace }}/build/wdiff/src/wdiff.exe"
          DF="${{ github.workspace }}/build/diffutils/src/diff.exe"
          echo "==> Windows smoke is currently informational only."
          ls -la "$WD" || { echo "FAIL: wdiff.exe missing"; exit 1; }
          ls -la "$DF" || { echo "FAIL: diff.exe missing"; exit 1; }
          "$WD" --version 2>&1 | head -3 || true
          "$DF" --version 2>&1 | head -3 || true
          echo "OK: both binaries execute; round-trip smoke deferred."

      # ---- package ----
      - name: Package (Linux / macOS)
        if: matrix.os != 'windows'
        run: TARGET=${{ matrix.target }} bash scripts/package.sh

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        env:
          TARGET: ${{ matrix.target }}
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/package.ps1

      # ---- verify ----
      - name: Verify self-contained (macOS only)
        if: matrix.os == 'macos'
        run: |
          set -e
          bin="dist/wdiff-${{ matrix.target }}/bin/wdiff"
          otool -L "$bin"
          otool -L "$bin" | grep -E '/(opt/homebrew|usr/local)/' \
            && { echo "FAIL: $bin links Homebrew dylibs"; exit 1; } || true
          echo "OK: only system libs (/usr/lib, /System/Library)"

      - name: Show file type & size
        if: matrix.os != 'windows'
        run: |
          file dist/wdiff-${{ matrix.target }}/bin/wdiff
          du -h dist/wdiff-${{ matrix.target }}.tar.gz

      - name: Show file type & size (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem dist/wdiff-${{ matrix.target }}/bin/wdiff.exe | Format-Table Name, Length
          Get-ChildItem dist/wdiff-${{ matrix.target }}.zip | Format-Table Name, Length

      # ---- upload artifact (used by the release job below) ----
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wdiff-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
