name: release

# Publish stage: tag a v* (or trigger manually) → GitHub Release with
# per-target tarball/zip + per-archive sha256 + top-level SHA256SUMS.
#
# Splits cleanly with `build-and-test.yml`:
#   - push / pull_request → build-and-test.yml (auto-test stage)
#   - tag push / dispatch → THIS workflow (publish stage)
#
# The build matrix below is intentionally identical to build-and-test.yml
# so a tag push produces a release in one shot, without depending on a
# separate workflow_run pull. The trade-off is that a tag push runs the
# matrix twice (here + in build-and-test.yml) ≈ +2 min — accepted for
# the simpler workflow_run-free model.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- main release matrix (tag + dispatch only) ----
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-linux-musl,  runner: ubuntu-latest,    os: linux,   libc: musl, docker_arch: amd64 }
          - { target: aarch64-linux-musl, runner: ubuntu-24.04-arm, os: linux,   libc: musl, docker_arch: arm64 }
          - { target: aarch64-macos,      runner: macos-14,         os: macos                 }
          - { target: x86_64-macos,       runner: macos-14,         os: macos                 }
          - { target: x86_64-windows,     runner: windows-latest,   os: windows               }
          # aarch64-windows deferred.
    continue-on-error: ${{ matrix.target == 'aarch64-linux-musl' || matrix.target == 'aarch64-macos' || matrix.target == 'x86_64-macos' || matrix.target == 'x86_64-windows' }}
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux gnu)
        if: matrix.libc == 'musl'
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool

      - name: Install deps (macOS)
        if: matrix.os == 'macos'
        run: |
          brew update
          brew install autoconf automake libtool

      - name: Install deps (Windows MSYS2 + mingw64)
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git autoconf automake libtool
            make base-devel
            mingw-w64-x86_64-gcc

      - name: Build + smoke on Alpine (musl)
        if: matrix.libc == 'musl'
        run: docker run --rm --platform linux/${{ matrix.docker_arch }} -v "$PWD":/w -w /w alpine:3.20 sh -c 'apk add --no-cache bash gettext-dev libxslt texinfo >/dev/null && bash /w/scripts/build-alpine.sh && bash /w/scripts/smoke.sh'

      - name: Build (macOS — host)
        if: matrix.os == 'macos' && matrix.target == 'aarch64-macos'
        run: bash scripts/build.sh

      - name: Build (macOS x86_64 — cross-compile)
        if: matrix.target == 'x86_64-macos'
        env:
          WDIFF_TARGET_ARCH: x86_64
          WDIFF_TARGET_OS: apple-darwin
          WDIFF_OS_HINT: darwin
        run: bash scripts/build.sh

      - name: Build (Windows x86_64 — msys2 bash)
        if: matrix.os == 'windows' && matrix.target == 'x86_64-windows'
        shell: msys2 {0}
        run: bash scripts/build.sh

      - name: Smoke test on host (gnu / macos)
        if: matrix.os != 'windows' && matrix.libc != 'musl'
        run: bash scripts/smoke.sh

      - name: Package (Linux / macOS)
        if: matrix.os != 'windows'
        run: TARGET=${{ matrix.target }} bash scripts/package.sh

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        env:
          TARGET: ${{ matrix.target }}
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/package.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wdiff-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  # ---- publish on tag ----
  release:
    if: startsWith(github.ref, 'refs/tags/v') && needs.build.result == 'success'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # upload release assets + create the release
      id-token: write       # cosign keyless OIDC
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          cd dist
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 \
            | xargs -0 sha256sum | sed 's|^\([^ ]*\)  \./|\1  |' > SHA256SUMS
          cat SHA256SUMS

      # ---- cosign keyless signing -----------------------------------
      # `cosign sign-blob` in keyless mode uses the OIDC token issued
      # to this GitHub Actions job (via `id-token: write`) and
      # produces a Fulcio-issued cert + Rekor transparency-log entry
      # per artefact. The public key is the OIDC issuer's identity
      # (github.com/ljh-sh/wdiff/.github/workflows/release.yml@refs/tags/vX.Y.Z).
      # Verifiers do:
      #   cosign verify-blob --certificate-identity-regexp 'github.com/ljh-sh/wdiff' \
      #     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
      #     wdiff-x86_64-linux-musl.tar.gz \
      #     wdiff-x86_64-linux-musl.tar.gz.sig \
      #     wdiff-x86_64-linux-musl.tar.gz.cert
      - name: Install cosign
        uses: sigstore/cosign-installer@2c152972ef6649eb3f7c917a9b9b5d1e2c408c46 # v3.5.0
      - name: Sign release artefacts (keyless, OIDC)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cd dist
          for f in $(find . -type f \( -name '*.tar.gz' -o -name '*.zip' \)); do
            echo "==> signing $f"
            cosign sign-blob --yes --output-signature "${f}.sig" --output-certificate "${f}.cert" "$f"
          done
          echo "==> cosign.signing done; $(ls *.sig 2>/dev/null | wc -l) signatures + $(ls *.cert 2>/dev/null | wc -l) certs"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sig
            dist/*.tar.gz.cert
            dist/*.zip
            dist/*.zip.sig
            dist/*.zip.cert
            dist/*.sha256
            dist/SHA256SUMS
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            x eget ljh-sh/wdiff
            ```

            Or download a per-target tarball, verify with the SHA256SUMS file,
            and (in v0.2.0+) verify the cosign keyless signature:

            ```bash
            curl -L -O https://github.com/ljh-sh/wdiff/releases/latest/download/wdiff-x86_64-linux-musl.tar.gz
            curl -L -O https://github.com/ljh-sh/wdiff/releases/latest/download/wdiff-x86_64-linux-musl.tar.gz.sig
            curl -L -O https://github.com/ljh-sh/wdiff/releases/latest/download/wdiff-x86_64-linux-musl.tar.gz.cert
            curl -L -O https://github.com/ljh-sh/wdiff/releases/latest/download/wdiff-x86_64-linux-musl.tar.gz.sha256
            sha256sum -c wdiff-x86_64-linux-musl.tar.gz.sha256
            cosign verify-blob \
              --certificate-identity-regexp 'github.com/ljh-sh/wdiff' \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
              wdiff-x86_64-linux-musl.tar.gz \
              wdiff-x86_64-linux-musl.tar.gz.sig \
              wdiff-x86_64-linux-musl.tar.gz.cert
            ```

            See [ljh-sh.github.io/wdiff](https://ljh-sh.github.io/wdiff/) for the full
            install walkthrough, tldr examples, and security audit.
